name: 'Ladybird Build'

description: 'Builds Ladybird Browser with caching and dependency installation'

inputs:
  os-name:
    description: 'Operating system name (ubuntu or fedora)'
    required: true
    type: string
  compiler:
    description: 'Compiler to use'
    required: true
    type: string
    default: 'gcc-14'
  container-image:
    description: 'Docker container image for containerized builds'
    required: false
    type: string
    default: ''
  timeout-minutes:
    description: 'Job timeout in minutes'
    required: false
    type: number
    default: 360

outputs:
  artifact-path:
    description: 'Path to the built artifact'
    value: ${{ steps.build.outputs.artifact-path }}

runs:
  using: 'composite'
  steps:
    - name: Checkout builder repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Clone Ladybird repository
      uses: actions/checkout@v4
      with:
        repository: LadybirdBrowser/ladybird
        path: ladybird-src
        fetch-depth: 1
        submodules: recursive

    - name: Cache vcpkg dependencies
      uses: actions/cache@v4
      with:
        path: ladybird-src/Build/vcpkg
        key: vcpkg-${{ inputs.os-name }}-${{ runner.os }}-${{ hashFiles('**/vcpkg.json') }}
        restore-keys: |
          vcpkg-${{ inputs.os-name }}-${{ runner.os }}-

    - name: Configure ccache
      shell: bash
      run: |
        mkdir -p ~/.cache/ccache
        echo "max_size = 500M" > ~/.cache/ccache.conf
        echo "compression = true" >> ~/.cache/ccache.conf
        echo "CC=ccache gcc" >> $GITHUB_ENV
        echo "CXX=ccache g++" >> $GITHUB_ENV
        ccache -M 500M
        ccache -z

    - name: Install dependencies
      shell: bash
      run: |
        echo "Installing dependencies for ${{ inputs.os-name }}..."
        if [ "${{ inputs.os-name }}" = "ubuntu" ]; then
          sudo apt update
          sudo apt install -y autoconf autoconf-archive automake build-essential \
            ccache cmake curl fonts-liberation2 git libdrm-dev libgl1-mesa-dev \
            libtool nasm ninja-build patchelf pkg-config python3-venv \
            qt6-base-dev qt6-tools-dev-tools qt6-wayland tar unzip zip \
            libpulse-dev libx11-dev libxcb1-dev libxkbcommon-dev \
            libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev
        elif [ "${{ inputs.os-name }}" = "fedora" ]; then
          dnf update -y
          dnf install -y ccache tree autoconf-archive automake cmake curl git \
            libdrm-devel liberation-sans-fonts libglvnd-devel libtool nasm \
            ninja-build patchelf perl-FindBin perl-IPC-Cmd perl-lib \
            perl-Time-Piece qt6-qtbase-devel qt6-qttools-devel \
            qt6-qtwayland-devel tar unzip zip zlib-ng-compat-static \
            pulseaudio-libs-devel shadow-utils sudo
        fi

    - name: Build Ladybird
      id: build
      shell: bash
      working-directory: ladybird-src
      run: |
        ./Meta/ladybird.py build --preset Release

    - name: Verify build
      shell: bash
      working-directory: ladybird-src
      run: |
        if [ ! -f "Build/release/bin/Ladybird" ]; then
          echo "ERROR: Ladybird binary not found after build" >&2
          ls -la Build/release/bin/ >&2
          exit 1
        fi
        echo "Build verification passed"
        ls -lh Build/release/bin/Ladybird

    - name: Show ccache statistics
      shell: bash
      run: |
        ccache -s
        ccache -p
